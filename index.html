<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Maru</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* === Token: Warna (Deep-sea bioluminescence) === */
            --bg-body: #06090c;
            --bg-card: #0d1419;
            --bg-chat: #0a1014;
            --bg-bot-msg: #101a1f;
            --border-soft: #1c2a2f;
            --border-softer: #142025;

            --accent: #22d3c4;
            --accent-dim: #1a9d92;
            --accent-glow: rgba(34, 211, 196, 0.35);

            --text-main: #e8f4f2;
            --text-muted: #5c7a78;
            --text-faint: #3a4d4b;

            --user-bubble: #15292a;
            --user-border: #224241;

            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            height: 100%;
            background: var(--bg-body);
            background-image:
                radial-gradient(circle at 15% 0%, rgba(34, 211, 196, 0.05) 0%, transparent 45%),
                radial-gradient(circle at 85% 100%, rgba(34, 211, 196, 0.04) 0%, transparent 50%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* === Layout shell === */
        .app {
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .panel {
            width: 100%;
            max-width: 760px;
            height: min(88vh, 860px);
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(34, 211, 196, 0.03) inset;
            position: relative;
        }

        /* Signature: garis scan halus yang bergerak pelan di top border */
        .panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.6;
            animation: scan 6s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { transform: translateX(-30%); opacity: 0; }
            50% { transform: translateX(30%); opacity: 0.6; }
        }

        /* === Header === */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border-softer);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 13px;
        }

        /* Signature: orb avatar berpendar */
        .orb {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle at 35% 30%, #4ee8da, var(--accent-dim) 70%);
            box-shadow: 0 0 16px var(--accent-glow);
            flex-shrink: 0;
        }

        .orb::after {
            content: "";
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1px solid var(--accent-dim);
            opacity: 0.5;
            animation: pulse-ring 2.6s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .orb.thinking {
            animation: orb-think 1.1s ease-in-out infinite;
        }

        @keyframes orb-think {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
        }

        .identity h1 {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent-glow);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: transparent;
            border: 1px solid var(--border-soft);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, transform 0.2s;
        }

        .btn-icon:hover {
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        .btn-icon:active { transform: scale(0.94); }

        .btn-icon svg { width: 17px; height: 17px; }

        /* === Chat area === */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-chat);
            padding: 22px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb {
            background: var(--border-soft);
            border-radius: 10px;
        }

        .msg-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            max-width: 88%;
            animation: rise 0.35s ease forwards;
            opacity: 0;
            transform: translateY(8px);
        }

        @keyframes rise {
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .mini-orb {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #4ee8da, var(--accent-dim) 70%);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14.5px;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .msg-row.bot .bubble {
            background: var(--bg-bot-msg);
            border: 1px solid var(--border-softer);
            border-bottom-left-radius: 5px;
            color: var(--text-main);
        }

        .msg-row.user .bubble {
            background: var(--user-bubble);
            border: 1px solid var(--user-border);
            border-bottom-right-radius: 5px;
            color: var(--text-main);
        }

        .typing-row .bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 16px;
        }

        .typing-row .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.3s infinite ease-in-out both;
        }

        .typing-row .dot:nth-child(2) { animation-delay: -0.18s; }
        .typing-row .dot:nth-child(3) { animation-delay: -0.36s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* === Footer / input === */
        .footer {
            padding: 16px 18px;
            border-top: 1px solid var(--border-softer);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-body);
            border: 1px solid var(--border-soft);
            border-radius: 14px;
            padding: 5px 6px 5px 18px;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .input-row:focus-within {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 14.5px;
            padding: 11px 0;
        }

        #userInput::placeholder { color: var(--text-faint); }

        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: 11px;
            border: none;
            background: var(--accent);
            color: #06090c;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
            flex-shrink: 0;
        }

        .btn-send svg { width: 17px; height: 17px; }

        .btn-send:hover {
            box-shadow: 0 0 18px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-send:active { transform: scale(0.94); }

        .btn-send:disabled {
            background: var(--border-soft);
            color: var(--text-faint);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-faint);
            margin-top: 10px;
            letter-spacing: 0.2px;
        }

        /* === Responsive: mobile === */
        @media (max-width: 600px) {
            .app { padding: 0; }

            .panel {
                height: 100vh;
                height: 100dvh;
                max-width: none;
                border-radius: 0;
                border: none;
            }

            .header { padding: 14px 16px; }
            .chat-box { padding: 16px; }
            .footer { padding: 12px 14px 16px; }
            .msg-row { max-width: 92%; }
            .identity h1 { font-size: 16px; }
        }

        @media (min-width: 601px) and (max-width: 900px) {
            .panel { max-width: 600px; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="panel">

        <div class="header">
            <div class="header-left">
                <div class="orb" id="headerOrb"></div>
                <div class="identity">
                    <h1>Maru</h1>
                    <div class="status-line">
                        <span class="status-dot"></span>
                        <span id="statusText">Siap membantu</span>
                    </div>
                </div>
            </div>
            <button class="btn-icon" onclick="resetChat()" title="Mulai obrolan baru" aria-label="Mulai obrolan baru">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
            </button>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="msg-row bot">
                <div class="mini-orb"></div>
                <div class="bubble">Halo, aku Maru. Ada yang bisa dibantu?</div>
            </div>
        </div>

        <div class="footer">
            <form id="chatForm">
                <div class="input-row">
                    <input type="text" id="userInput" placeholder="Tulis pesan..." required autocomplete="off">
                    <button type="submit" class="btn-send" id="btnKirim" aria-label="Kirim pesan">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
            <div class="hint">Maru bisa membuat kesalahan. Periksa info penting.</div>
        </div>

    </div>
</div>

<script>
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const chatBox = document.getElementById('chatBox');
    const btnKirim = document.getElementById('btnKirim');
    const headerOrb = document.getElementById('headerOrb');
    const statusText = document.getElementById('statusText');

    const WORKER_URL = 'https://chatbot-cf-worker.syahnannur.workers.dev';

    // === RIWAYAT PERCAKAPAN ===
    // Disimpan di memori (variabel JS) supaya bot tahu konteks chat
    // sebelumnya dalam sesi yang sama. Hilang saat reload -> itu wajar,
    // karena ini bukan database persisten.
    let chatHistory = [];
    const MAX_HISTORY_PAIRS = 8;

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;

        appendMessage(message, 'user');
        userInput.value = '';
        showTypingIndicator();

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    history: chatHistory
                })
            });

            const data = await response.json();
            removeTypingIndicator();

            let botReply;
            if (data.response) {
                botReply = data.response;
            } else if (typeof data === 'object' && Object.values(data)[0]) {
                botReply = Object.values(data)[0];
            } else {
                botReply = 'Format respons tidak dikenali.';
            }

            appendMessage(botReply, 'bot');

            chatHistory.push({ role: 'user', content: message });
            chatHistory.push({ role: 'assistant', content: botReply });

            const maxEntries = MAX_HISTORY_PAIRS * 2;
            if (chatHistory.length > maxEntries) {
                chatHistory = chatHistory.slice(-maxEntries);
            }

        } catch (error) {
            removeTypingIndicator();
            console.error(error);
            appendMessage('Terjadi kesalahan koneksi atau masalah CORS.', 'bot');
        }
    });

    function resetChat() {
        chatHistory = [];
        window.location.reload();
    }

    function appendMessage(text, sender) {
        const row = document.createElement('div');
        row.classList.add('msg-row', sender);

        const avatarEl = document.createElement('div');
        avatarEl.className = sender === 'bot' ? 'mini-orb' : 'mini-orb';
        if (sender === 'user') {
            avatarEl.style.background = 'var(--user-border)';
        }

        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.textContent = text;

        row.appendChild(avatarEl);
        row.appendChild(bubble);
        chatBox.appendChild(row);

        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function showTypingIndicator() {
        btnKirim.disabled = true;
        headerOrb.classList.add('thinking');
        statusText.textContent = 'Berpikir...';

        const row = document.createElement('div');
        row.classList.add('msg-row', 'bot', 'typing-row');
        row.id = 'typingIndicator';
        row.innerHTML = `
            <div class="mini-orb"></div>
            <div class="bubble">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
        `;
        chatBox.appendChild(row);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function removeTypingIndicator() {
        btnKirim.disabled = false;
        headerOrb.classList.remove('thinking');
        statusText.textContent = 'Siap membantu';
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }
</script>
</body>
</html>
